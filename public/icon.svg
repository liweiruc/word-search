<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#4a6cf7"/>
  <!-- 3x3 grid of letter tiles -->
  <rect x="72"  y="72"  width="108" height="108" rx="18" fill="rgba(255,255,255,0.25)"/>
  <rect x="202" y="72"  width="108" height="108" rx="18" fill="rgba(255,255,255,0.90)"/>
  <rect x="332" y="72"  width="108" height="108" rx="18" fill="rgba(255,255,255,0.25)"/>
  <rect x="72"  y="202" width="108" height="108" rx="18" fill="rgba(255,255,255,0.90)"/>
  <rect x="202" y="202" width="108" height="108" rx="18" fill="rgba(255,255,255,0.25)"/>
  <rect x="332" y="202" width="108" height="108" rx="18" fill="rgba(255,255,255,0.90)"/>
  <rect x="72"  y="332" width="108" height="108" rx="18" fill="rgba(255,255,255,0.25)"/>
  <rect x="202" y="332" width="108" height="108" rx="18" fill="rgba(255,255,255,0.90)"/>
  <rect x="332" y="332" width="108" height="108" rx="18" fill="rgba(255,255,255,0.25)"/>
  <!-- Letters W S on the bright tiles -->
  <text x="256" y="158" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="72" fill="#4a6cf7">W</text>
  <text x="126" y="258" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="72" fill="#4a6cf7">S</text>
  <text x="386" y="258" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="72" fill="#4a6cf7">E</text>
  <text x="256" y="388" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="72" fill="#4a6cf7">A</text>
</svg>
